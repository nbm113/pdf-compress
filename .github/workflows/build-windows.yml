name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask pikepdf Pillow pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --name "PDF-Compress" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --collect-all pikepdf `
            --hidden-import pikepdf `
            --hidden-import PIL._imaging `
            app.py

      - name: Create launcher
        run: |
          @"
          @echo off
          chcp 65001 >nul
          title PDF Compress
          echo 启动中...
          start http://127.0.0.1:5050
          start "" "%~dp0PDF-Compress.exe"
          "@ | Out-File -FilePath "dist\PDF-Compress\启动.bat" -Encoding Default

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Compress-Windows
          path: dist\PDF-Compress\
          retention-days: 7
